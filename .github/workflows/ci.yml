name: CI — MLflow Training Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ─────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ────────────────────────────────────────────────────
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn>=1.3.0 mlflow>=2.10.0 pandas>=2.0.0 \
                      numpy>=1.24.0 matplotlib>=3.7.0 seaborn>=0.12.0

      # ── 4. Run MLflow Project ──────────────────────────────────────────────
      - name: Run MLflow Project
        run: |
          mlflow run MLProject/ \
            --env-manager=local \
            -P data_path=MLProject/loan_approval_dataset_preprocessing.csv \
            -P n_estimators=100 \
            -P max_depth=10
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db

      # ── 5. Upload Artefak ke GitHub ────────────────────────────────────────
      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ github.run_number }}
          path: |
            mlflow.db
            mlruns/
          retention-days: 30
